<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MCQSchool — Admin Panel</title>
    <link rel="stylesheet" href="/css/style.css">
</head>
<body>

<!-- =============================================
     ADMIN LOGIN SCREEN
     ============================================= -->
<div id="loginScreen" class="admin-login-wrap">
    <div class="logo">MCQSchool</div>
    <p class="subtitle">Admin Panel — Please log in to continue.</p>

    <div id="loginError" class="error-msg hidden"></div>

    <div class="form-group">
        <label>Username</label>
        <input type="text" id="loginUsername" placeholder="Enter admin username" autocomplete="username">
    </div>

    <div class="form-group">
        <label>Password</label>
        <input type="password" id="loginPassword" placeholder="Enter admin password" autocomplete="current-password">
    </div>

    <button id="loginBtn" style="width:100%;">Login</button>

    <p style="margin-top: 18px; font-size: 13px; color: #9ca3af; text-align:center;">
        <a href="/" style="color:#2563eb; text-decoration:none;">← Back to Quiz</a>
    </p>
</div>

<!-- =============================================
     ADMIN DASHBOARD (shown after login)
     ============================================= -->
<div id="adminDashboard" class="hidden">

    <!-- Add Question Panel -->
    <div class="admin-panel">
        <div class="admin-header">
            <div>
                <div class="admin-title">🛠️ Admin Dashboard</div>
                <div style="font-size:13px; color:#6b7280; margin-top:3px;">
                    Logged in as <strong>Admin</strong>
                </div>
            </div>
            <button class="logout-btn" id="logoutBtn">Logout</button>
        </div>

        <!-- Add New Question Form -->
        <div class="section-title">➕ Add New Question</div>

        <div id="addError" class="error-msg hidden"></div>

        <div class="form-group">
            <label>Question Text</label>
            <input type="text" id="adminQuestion" placeholder="e.g., What is 2 + 2?">
        </div>

        <div class="form-group">
            <label>Option 1</label>
            <input type="text" id="adminOpt1" placeholder="First option">
        </div>

        <div class="form-group">
            <label>Option 2</label>
            <input type="text" id="adminOpt2" placeholder="Second option">
        </div>

        <div class="form-group">
            <label>Option 3</label>
            <input type="text" id="adminOpt3" placeholder="Third option">
        </div>

        <div class="form-group">
            <label>Option 4</label>
            <input type="text" id="adminOpt4" placeholder="Fourth option">
        </div>

        <div class="form-group">
            <label>Correct Answer (must match one option exactly)</label>
            <input type="text" id="adminCorrect" placeholder="Type the correct option here exactly">
        </div>

        <button class="green-btn" id="addQuestionBtn">Add Question to Database</button>
        <div class="pool-counter" id="poolCounter">Loading question count...</div>
    </div>

    <!-- Questions List Panel -->
    <div class="admin-panel">
        <div class="admin-title">📋 All Questions in Database</div>
        <div id="questionsTableWrap">
            <p class="loading-msg">Loading questions...</p>
        </div>
    </div>

</div>

<!-- Success Toast -->
<div class="toast" id="toast"></div>

<script src="/js/admin.js"></script>
</body>
</html>
